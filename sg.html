<!DOCTYPE html>
<html>
<head>
<title>Singapore Industrial Simulator</title>
<style>
body { font-family:Arial; margin:0; display:flex; background:#0a0c0f; color:white; }
#panel { width:300px; padding:15px; background:#111; }
canvas { flex:1; background:#060810; }
input,select,textarea{ width:100%; margin-bottom:8px; background:#000; color:#fff; border:1px solid #333;}
button{ width:100%; padding:10px; background:#e8ff47; border:none; }
h2{ color:#e8ff47; }
</style>
</head>

<body>

<div id="panel">
<h2>🇸🇬 SG Simulator</h2>

<label>Plot Ratio (PR)</label>
<input id="pr" value="2.5">

<label>Industrial Type</label>
<select id="type">
<option value="b1">B1</option>
<option value="b2">B2</option>
</select>

<label>Lot Coords</label>
<textarea id="coords">0,0
120,0
120,80
0,80</textarea>

<label>Buildings</label>
<input id="nB" value="2">

<label>Storeys</label>
<input id="nS" value="2">

<label>Yard Width (m)</label>
<input id="yard" value="20">

<button onclick="run()">Run</button>
</div>

<canvas id="cv"></canvas>

<script>
const ctx = cv.getContext("2d");

function parse(){
  return coords.value.trim().split("\n").map(l=>{
    const [x,y]=l.split(',').map(Number);
    return [x,y];
  });
}

function area(p){
  let a=0;
  for(let i=0;i<p.length;i++){
    let j=(i+1)%p.length;
    a+=p[i][0]*p[j][1]-p[j][0]*p[i][1];
  }
  return Math.abs(a/2);
}

function bbox(p){
  let xs=p.map(v=>v[0]), ys=p.map(v=>v[1]);
  return {
    minX:Math.min(...xs), maxX:Math.max(...xs),
    minY:Math.min(...ys), maxY:Math.max(...ys)
  };
}

function run(){

  let pts=parse();
  let b=bbox(pts);

  let lotArea=area(pts);
  let pr=+document.getElementById("pr").value;
  let maxGFA=lotArea*pr;

  let nB=+nB.value;
  let nS=+nS.value;
  let yard=+yard.value;

  // SG truck rules
  let type=document.getElementById("type").value;
  let radius = type==="b2"?15:12;

  let truckOK = yard >= radius*2;

  cv.width=window.innerWidth-300;
  cv.height=window.innerHeight;

  ctx.clearRect(0,0,cv.width,cv.height);

  let scale=4;

  // lot
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i==0) ctx.moveTo(p[0]*scale,p[1]*scale);
    else ctx.lineTo(p[0]*scale,p[1]*scale);
  });
  ctx.closePath();
  ctx.strokeStyle="#e8ff47";
  ctx.stroke();

  // buildings
  let bw=(b.maxX-b.minX)/nB;

  for(let i=0;i<nB;i++){
    let x=b.minX+i*bw;
    let y=b.minY;

    ctx.fillStyle="#0d1e2e";
    ctx.fillRect(x*scale,y*scale,bw*scale,30*scale);
  }

  // info
  ctx.fillStyle="white";
  ctx.fillText("GFA Max: "+maxGFA.toFixed(0),20,20);
  ctx.fillText("Truck OK: "+truckOK,20,40);
}
run();
</script>

</body>
</html>
