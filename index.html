<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Industrial Feasibility Simulator</title>

<style>
body { margin:0; display:flex; font-family:Arial; background:#0a0c0f; color:white; }
#panel { width:320px; padding:15px; background:#111; }
canvas { flex:1; background:#060810; }

input, select, textarea {
  width:100%;
  margin-bottom:10px;
  padding:6px;
  background:#000;
  color:#fff;
  border:1px solid #333;
}

button {
  width:100%;
  padding:10px;
  background:#e8ff47;
  border:none;
  font-weight:bold;
}

h2 { color:#e8ff47; }
.mode-title { color:#47c8ff; font-size:13px; margin-bottom:10px; }
</style>
</head>

<body>

<div id="panel">
<h2>Feasibility Tool</h2>

<label>Country Mode</label>
<select id="country" onchange="updateMode()">
  <option value="SG">🇸🇬 Singapore</option>
  <option value="MY">🇲🇾 Malaysia</option>
</select>

<div id="modeInfo" class="mode-title"></div>

<label>Coordinate Mode</label>
<select id="coordMode">
  <option value="local">Local (meters)</option>
  <option value="geo">Google Lat/Lon</option>
</select>

<label>Plot Ratio</label>
<input id="pr" value="2.5">

<label>Industrial Type / Zone</label>
<select id="type">
  <option value="b1">Light / B1</option>
  <option value="b2">Heavy / B2</option>
</select>

<label>Lot Coordinates</label>
<textarea id="coords">0,0
120,0
120,80
0,80</textarea>

<label>Buildings</label>
<input id="nB" value="2">

<label>Storeys</label>
<input id="nS" value="2">

<label>Yard Width (m)</label>
<input id="yard" value="20">

<button onclick="run()">Run Simulation</button>

</div>

<canvas id="cv"></canvas>

<script>

// ─────────────────────────────
// GEO CONVERSION
// ─────────────────────────────
function latLonToMeters(lat, lon, oLat, oLon){
  const R = 6378137;
  const dLat = (lat - oLat) * Math.PI / 180;
  const dLon = (lon - oLon) * Math.PI / 180;

  return [
    dLon * R * Math.cos(oLat * Math.PI / 180),
    dLat * R
  ];
}

// ─────────────────────────────
// PARSE COORDS
// ─────────────────────────────
function parse(){

  const mode = document.getElementById("coordMode").value;

  let pts = coords.value.trim().split("\n").map(l=>{
    const [a,b] = l.split(',').map(Number);
    return [a,b];
  });

  if(mode === "geo"){
    const originLat = pts[0][0];
    const originLon = pts[0][1];

    pts = pts.map(p =>
      latLonToMeters(p[0], p[1], originLat, originLon)
    );
  }

  return pts;
}

// ─────────────────────────────
// GEOMETRY
// ─────────────────────────────
function area(p){
  let a=0;
  for(let i=0;i<p.length;i++){
    let j=(i+1)%p.length;
    a+=p[i][0]*p[j][1]-p[j][0]*p[i][1];
  }
  return Math.abs(a/2);
}

function bbox(p){
  let xs=p.map(v=>v[0]), ys=p.map(v=>v[1]);
  return {
    minX:Math.min(...xs), maxX:Math.max(...xs),
    minY:Math.min(...ys), maxY:Math.max(...ys)
  };
}

// ─────────────────────────────
// MODE LABEL
// ─────────────────────────────
function updateMode(){
  const mode = country.value;

  if(mode==="SG"){
    modeInfo.innerHTML = "Singapore (JTC rules active)";
  } else {
    modeInfo.innerHTML = "Malaysia (general industrial rules)";
  }
}

// ─────────────────────────────
// RUN SIMULATION
// ─────────────────────────────
const ctx = cv.getContext("2d");

function run(){

  const pts = parse();
  const b = bbox(pts);

  const lotArea = area(pts);
  const pr = +pr.value;
  const maxGFA = lotArea * pr;

  const mode = country.value;
  const typeVal = type.value;
  const yardW = +yard.value;
  const nBuildings = +nB.value;

  let resultText = "";

  // ── SG LOGIC ──
  if(mode==="SG"){
    const truckRadius = (typeVal==="b2") ? 15 : 12;
    const truckOK = yardW >= truckRadius * 2;

    resultText = `
Mode: Singapore
Max GFA: ${maxGFA.toFixed(0)}
Truck Access: ${truckOK ? "OK ✅" : "FAIL ❌"}
`;
  }

  // ── MY LOGIC ──
  if(mode==="MY"){
    let coverage = (typeVal==="b1") ? 60 : 70;

    resultText = `
Mode: Malaysia
Max GFA: ${maxGFA.toFixed(0)}
Coverage Limit: ${coverage}%
`;
  }

  // ─────────────────────────────
  // DRAW
  // ─────────────────────────────
  cv.width = window.innerWidth - 320;
  cv.height = window.innerHeight;

  ctx.clearRect(0,0,cv.width,cv.height);

  const scale = 3;

  // Lot
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i===0) ctx.moveTo(p[0]*scale, p[1]*scale);
    else ctx.lineTo(p[0]*scale, p[1]*scale);
  });
  ctx.closePath();
  ctx.strokeStyle="#e8ff47";
  ctx.stroke();

  // Buildings
  const bw = (b.maxX - b.minX) / nBuildings;

  for(let i=0;i<nBuildings;i++){
    const x = b.minX + i * bw;
    const y = b.minY;

    ctx.fillStyle="#0d1e2e";
    ctx.fillRect(x*scale, y*scale, bw*scale, 30*scale);
  }

  // Text output
  ctx.fillStyle="white";
  ctx.font="12px Arial";

  resultText.split("\n").forEach((line,i)=>{
    ctx.fillText(line.trim(),20,20 + i*15);
  });
}

// INIT
updateMode();
run();

</script>

</body>
</html>
