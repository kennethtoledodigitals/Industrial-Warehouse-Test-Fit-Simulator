<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Industrial Feasibility Simulator</title>

<style>
body {
  margin:0;
  display:flex;
  font-family:Arial;
  background:#0a0c0f;
  color:white;
}

#panel {
  width:320px;
  padding:15px;
  background:#111;
}

canvas {
  flex:1;
  background:#060810;
}

input, select, textarea {
  width:100%;
  margin-bottom:10px;
  background:#000;
  color:#fff;
  border:1px solid #333;
  padding:6px;
}

button {
  width:100%;
  padding:10px;
  background:#e8ff47;
  border:none;
  font-weight:bold;
}

h2 { color:#e8ff47; }
.mode-title { font-size:13px; margin-bottom:10px; color:#47c8ff; }
</style>
</head>

<body>

<div id="panel">
  <h2>Feasibility Tool</h2>

  <label>Country Mode</label>
  <select id="country" onchange="updateMode()">
    <option value="SG">🇸🇬 Singapore (JTC)</option>
    <option value="MY">🇲🇾 Malaysia</option>
  </select>

  <div id="modeInfo" class="mode-title"></div>

  <label>Plot Ratio</label>
  <input id="pr" value="2.5">

  <label id="typeLabel">Industrial Type</label>
  <select id="type">
    <option value="b1">B1 / Light</option>
    <option value="b2">B2 / Heavy</option>
  </select>

  <label>Lot Coordinates</label>
  <textarea id="coords">0,0
120,0
120,80
0,80</textarea>

  <label>Buildings</label>
  <input id="nB" value="2">

  <label>Storeys</label>
  <input id="nS" value="2">

  <label>Yard Width (m)</label>
  <input id="yard" value="20">

  <button onclick="run()">Run Simulation</button>
</div>

<canvas id="cv"></canvas>

<script>

// ─────────────────────────────
// GEOMETRY
// ─────────────────────────────
function parse(){
  return coords.value.trim().split("\n").map(l=>{
    const [x,y]=l.split(',').map(Number);
    return [x,y];
  });
}

function area(p){
  let a=0;
  for(let i=0;i<p.length;i++){
    let j=(i+1)%p.length;
    a+=p[i][0]*p[j][1]-p[j][0]*p[i][1];
  }
  return Math.abs(a/2);
}

function bbox(p){
  let xs=p.map(v=>v[0]), ys=p.map(v=>v[1]);
  return {
    minX:Math.min(...xs), maxX:Math.max(...xs),
    minY:Math.min(...ys), maxY:Math.max(...ys)
  };
}

// ─────────────────────────────
// MODE SWITCH
// ─────────────────────────────
function updateMode(){
  const mode = document.getElementById("country").value;
  const info = document.getElementById("modeInfo");
  const typeLabel = document.getElementById("typeLabel");

  if(mode==="SG"){
    info.innerHTML = "Using JTC / URA rules";
    typeLabel.innerHTML = "B1 / B2 Category";
  } else {
    info.innerHTML = "Using Malaysia industrial rules";
    typeLabel.innerHTML = "Industrial Zone";
  }
}

// ─────────────────────────────
// MAIN SIM
// ─────────────────────────────
const ctx = cv.getContext("2d");

function run(){

  const mode = document.getElementById("country").value;
  const pts = parse();
  const b = bbox(pts);

  const lotArea = area(pts);
  const pr = +document.getElementById("pr").value;
  const maxGFA = lotArea * pr;

  const nB = +document.getElementById("nB").value;
  const nS = +document.getElementById("nS").value;
  const yard = +document.getElementById("yard").value;
  const type = document.getElementById("type").value;

  let complianceText = "";

  // ─────────────────────────────
  // SG LOGIC
  // ─────────────────────────────
  if(mode==="SG"){

    let truckRadius = (type==="b2") ? 15 : 12;
    let truckOK = yard >= truckRadius * 2;

    complianceText = `
      Mode: Singapore (JTC)
      Max GFA: ${maxGFA.toFixed(0)}
      Truck Access: ${truckOK ? "OK" : "FAIL"}
    `;
  }

  // ─────────────────────────────
  // MY LOGIC
  // ─────────────────────────────
  if(mode==="MY"){

    let coverage;
    if(type==="b1") coverage=60;
    else if(type==="b2") coverage=70;
    else coverage=80;

    complianceText = `
      Mode: Malaysia
      Max GFA: ${maxGFA.toFixed(0)}
      Coverage Limit: ${coverage}%
    `;
  }

  // ─────────────────────────────
  // DRAW
  // ─────────────────────────────
  cv.width = window.innerWidth - 320;
  cv.height = window.innerHeight;

  ctx.clearRect(0,0,cv.width,cv.height);

  let scale = 4;

  // Lot
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i==0) ctx.moveTo(p[0]*scale,p[1]*scale);
    else ctx.lineTo(p[0]*scale,p[1]*scale);
  });
  ctx.closePath();
  ctx.strokeStyle = "#e8ff47";
  ctx.stroke();

  // Buildings
  let bw = (b.maxX-b.minX)/nB;

  for(let i=0;i<nB;i++){
    let x=b.minX+i*bw;
    let y=b.minY;

    ctx.fillStyle = "#0d1e2e";
    ctx.fillRect(x*scale,y*scale,bw*scale,30*scale);
  }

  // Info
  ctx.fillStyle="white";
  ctx.font="12px Arial";

  let lines = complianceText.split("\n");
  lines.forEach((line,i)=>{
    ctx.fillText(line.trim(),20,20+(i*15));
  });
}

updateMode();
run();

</script>

</body>
</html>
