<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Industrial Simulator (Fixed)</title>

<style>
body { margin:0; font-family:Arial; background:#0a0c0f; color:white; display:flex }
#panel { width:320px; padding:15px; background:#111 }
canvas { flex:1; }

input, textarea {
  width:100%;
  margin-bottom:10px;
  background:#000;
  color:#fff;
  border:1px solid #333;
}

button {
  width:100%;
  padding:10px;
  background:#47c8ff;
  border:none;
}
</style>
</head>

<body>

<div id="panel">
<h2>Industrial Layout</h2>

<label>Lot Coordinates (lat,lon OR meters)</label>
<textarea id="coords">
1.3521,103.8198
1.3523,103.8202
1.3519,103.8203
1.3518,103.8199
</textarea>

<label>Buildings</label>
<input id="nB" value="3">

<label>Storeys</label>
<input id="nS" value="2">

<label>Yard Width</label>
<input id="yW" value="25">

<button onclick="run()">Run</button>
</div>

<canvas id="cv"></canvas>

<script>

const ctx = cv.getContext("2d");

// ✅ GEO conversion
function latLonToMeters(lat, lon, oLat, oLon){
  const R = 6378137;
  const dLat = (lat - oLat) * Math.PI/180;
  const dLon = (lon - oLon) * Math.PI/180;

  return [
    dLon * R * Math.cos(oLat*Math.PI/180),
    dLat * R
  ];
}

function parse(txt){

  let pts = txt.trim().split('\n').map(l=>{
    let [a,b] = l.split(',').map(Number);
    return [a,b];
  });

  // detect lat lon
  if(Math.abs(pts[0][0]) <= 90){
    let o = pts[0];
    pts = pts.map(p=>latLonToMeters(p[0],p[1],o[0],o[1]));
  }

  return pts;
}

function bbox(pts){
  let xs=pts.map(p=>p[0]);
  let ys=pts.map(p=>p[1]);

  return {
    minX:Math.min(...xs),
    maxX:Math.max(...xs),
    minY:Math.min(...ys),
    maxY:Math.max(...ys)
  };
}

// ✅ MAIN
function run(){

  let pts = parse(document.getElementById("coords").value);
  let b = bbox(pts);

  let nB = +document.getElementById("nB").value;
  let nS = +document.getElementById("nS").value;
  let yW = +document.getElementById("yW").value;

  const grid = 11.4;

  let W = b.maxX - b.minX;
  let H = b.maxY - b.minY;

  const targetMin = 120;
  const targetMax = 130;

  let availH = H - (nB-1)*yW;

  let bH = Math.min(targetMax, Math.max(targetMin, availH/nB));
  bH = Math.floor(bH/grid)*grid;

  let bw = Math.floor(W/grid)*grid;

  let yCursor = b.minY;

  let buildings=[];
  let yards=[];

  for(let i=0;i<nB;i++){

    buildings.push({
      x:b.minX,
      y:yCursor,
      w:bw,
      h:bH
    });

    yCursor += bH;

    if(i<nB-1){
      yards.push({
        x:b.minX,
        y:yCursor,
        w:bw,
        h:yW
      });
      yCursor += yW;
    }
  }

  draw(pts, buildings, yards);
}

// ✅ DRAW
function draw(pts, buildings, yards){

  cv.width = window.innerWidth-320;
  cv.height = window.innerHeight;

  ctx.clearRect(0,0,cv.width,cv.height);

  let scale=2;

  // lot
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i===0) ctx.moveTo(p[0]*scale,p[1]*scale);
    else ctx.lineTo(p[0]*scale,p[1]*scale);
  });
  ctx.closePath();
  ctx.strokeStyle="#47c8ff";
  ctx.stroke();

  // buildings
  buildings.forEach(b=>{
    ctx.fillStyle="#0d1e2e";
    ctx.fillRect(b.x*scale,b.y*scale,b.w*scale,b.h*scale);
    ctx.strokeStyle="#47c8ff";
    ctx.strokeRect(b.x*scale,b.y*scale,b.w*scale,b.h*scale);
  });

  // yards
  yards.forEach(y=>{
    ctx.fillStyle="#0c1e0c";
    ctx.fillRect(y.x*scale,y.y*scale,y.w*scale,y.h*scale);
    ctx.strokeStyle="#3dff9a";
    ctx.strokeRect(y.x*scale,y.y*scale,y.w*scale,y.h*scale);
  });
}

run();

</script>

</body>
</html>
